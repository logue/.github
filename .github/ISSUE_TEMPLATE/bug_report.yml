name: 🐛 Bug Report
description: Create a report to help us improve.
body:
  - type: markdown
    attributes:
      value: |
        ### ⚠️ Important / 重要
        - Please submit issues in **English** or **Japanese**. Issues in other languages may be closed.
        - 不具合の報告は**英語**または**日本語**で行ってください。それ以外の言語による投稿はクローズされる場合があります。
  - type: textarea
    id: bug-description
    attributes:
      label: 📝 Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: 🏷️ Version
      placeholder: e.g. v1.2.3
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 🔁 Steps to Reproduce
      description: How can we see the bug?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
    validations:
      required: true
  - type: file
    id: screenshot
    attributes:
      label: 🖼️ Screenshot (optional)
      description: If applicable, add screenshots to help explain your problem.
